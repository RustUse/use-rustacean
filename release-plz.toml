[workspace]
release = false
release_always = false
changelog_update = false
pr_labels = ["release"]
max_analyze_commits = 2000

[[package]]
name = "use-friend"
release = true
version_group = "rustuse-rustacean"

[[package]]
name = "use-friend-fixture"
release = true
version_group = "rustuse-rustacean"

[[package]]
name = "use-friend-registry"
release = true
version_group = "rustuse-rustacean"

[[package]]
name = "use-friend-markdown"
release = true
version_group = "rustuse-rustacean"

[[package]]
name = "use-rustacean"
release = true
version_group = "rustuse-rustacean"
changelog_update = true
changelog_path = "./CHANGELOG.md"
changelog_include = [
  "use-friend",
  "use-friend-fixture",
  "use-friend-registry",
  "use-friend-markdown",
]

[changelog]
header = """# Changelog

## Unreleased
"""
protect_breaking_commits = true
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat(?:\\([^)]+\\))?!?: .+", group = "Added" },
  { message = "^fix(?:\\([^)]+\\))?!?: .+", group = "Fixed" },
  { message = "^security(?:\\([^)]+\\))?!?: .+", group = "Security" },
  { message = "^(?:refactor|perf|change)(?:\\([^)]+\\))?!?: .+", group = "Changed" },
  { message = "^docs(?:\\([^)]+\\))?!?: .+", group = "Documentation" },
  { message = "^(?:build|ci|chore|deps|test)(?:\\([^)]+\\))?!?: .+", group = "Tooling" },
  { footer = "^changelog: ?ignore$", skip = true },
  { message = "^.*", group = "Changed" },
]
